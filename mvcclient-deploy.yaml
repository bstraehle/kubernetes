apiVersion: apps/v1
kind: Deployment
metadata:
  name: mvcclient-deploy
  labels:
    name: mvcclient-deploy
    app: mvcclient-app
spec:
  replicas: 1
  selector:
    matchLabels:
      name: mvcclient-app-pod
      app: mvcclient-app
  template:
    metadata:
      name: mvcclient-app-pod
      labels:
        name: mvcclient-app-pod
        app: mvcclient-app
    spec:
      containers:
        - name: mvcclient-app
          image: bstraehle/mvcclient:1.0.0
          ports:
            - containerPort: 80